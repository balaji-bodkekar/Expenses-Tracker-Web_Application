spring.application.name=expensesapp
server.port=${SERVER_PORT:8081}

spring.datasource.url=${DB_URL:jdbc:mysql://mysql:3306/expenses_tracker?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# Use 'update' to auto-create tables on startup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

logging.level.root=INFO
logging.level.com.SpringBootMVC=DEBUG
