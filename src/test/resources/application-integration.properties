# Integration Test Configuration - Testcontainers MySQL
spring.application.name=expensesapp
server.port=8081

# MySQL via Testcontainers (properties injected at runtime by @DynamicPropertySource)
# See IntegrationTestConfig.java for dynamic property configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration for MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

logging.level.root=INFO
logging.level.com.SpringBootMVC=DEBUG
