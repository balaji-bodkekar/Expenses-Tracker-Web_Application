name: CI - Three-Tier Testing Strategy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: springboot-app

jobs:

  # TIER 1: Unit Tests (Fast Path) - H2 In-Memory
  unit-tests:
    name: Unit Tests (H2)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run Spotless Check
        run: mvn spotless:check
      
      - name: Run Unit Tests
        run: |
          mvn test \
            -B \
            --no-transfer-progress \
            -Dgroups="unit" \
            -DfailIfNoTests=false
      
      - name: Upload Unit Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: target/surefire-reports
          retention-days: 30

  # TIER 2: Integration Tests (Containerized MySQL)
  integration-tests:
    name: Integration Tests (Testcontainers MySQL)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit-tests  # Run after unit tests pass
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      
      - name: Run Integration Tests
        run: |
          mvn test \
            -B \
            --no-transfer-progress \
            -Dgroups="integration" \
            -DfailIfNoTests=false
      
      - name: Upload Integration Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: target/surefire-reports
          retention-days: 30

  # Build JAR after all tests pass
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      
      - name: Build Package
        run: |
          mvn clean package -B --no-transfer-progress -DskipTests
      
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 30
      
      - name: Upload JaCoCo Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco
          retention-days: 30

  # TIER 3: Build & Push Docker Image (only after all tests + build pass)
  build-and-push:
    name: Build & Push to ECR
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::828562155228:role/github-actions-ecr-role
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Print Image URI
        run: |
          echo "Docker Image URI: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
  
  # TIER 4: Local Integration Verification on Runner
  # TIER 4: Local Integration Verification on Runner
  verify-deployment:
    name: Verify ECR Image on Runner
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::828562155228:role/github-actions-ecr-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull and Run Isolated Architecture
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
          DB_NAME: expenses_db
          DB_USER: root
          DB_PASSWORD: test_password
        run: |
          # 1. Custom runtime bridge network setup
          docker network create appbridge
          
          # 2. Ephemeral MySQL database container spin up karein
          docker run -d \
            --name mysql \
            --network appbridge \
            -e MYSQL_ROOT_PASSWORD=$DB_PASSWORD \
            -e MYSQL_DATABASE=$DB_NAME \
            mysql:latest
          
          # Wait window for MySQL initialization
          echo "Waiting for database sidecar layer..."
          sleep 20
          
          # 3. Main Application setup with exact docker-compose environment parity
          docker run -d \
            --name Expensetracker \
            --network appbridge \
            -p 8081:8081 \
            -e SPRING_DATASOURCE_USERNAME=$DB_USER \
            -e SPRING_DATASOURCE_PASSWORD=$DB_PASSWORD \
            -e SPRING_DATASOURCE_URL="jdbc:mysql://mysql:3306/$DB_NAME?allowPublicKeyRetrieval=true&useSSL=false" \
            -e SERVER_PORT=8081 \
            $REGISTRY/$REPOSITORY:$IMAGE_TAG
          
          # 4. Spring Boot initialization window
          echo "Waiting for Spring Boot context activation..."
          sleep 25
          
          # 5. Check logs & verify port 8081 responsiveness
          docker ps
          
          # Dynamic fallback mechanism using root container endpoint
          if curl -s --fail http://localhost:8081/; then
            echo "Ekdum mast! Application successfully validated on port 8081."
          else
            echo "Verification failed! Printing container telemetry logs:"
            docker logs Expensetracker
            exit 1
          fi

      - name: Infrastructure Cleanup
        if: always()
        run: |
          docker rm -f Expensetracker mysql || true
          docker network rm appbridge || true
