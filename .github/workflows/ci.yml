name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      manual_debug:
        description: Requires debug-approval environment reviewer
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      debug_timeout:
        description: Minutes before teardown (capped at 15)
        required: false
        default: "5"

permissions:
  id-token: write
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-and-scan:
    name: Build, Test & Scan
    uses: ./.github/workflows/build-and-scan.yml
    secrets: inherit

  verify-and-publish:
    name: Smoke Test & Publish
    needs: build-and-scan
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/verify-and-publish.yml
    with:
      image_tag: ${{ github.sha }}
      manual_debug: ${{ github.event.inputs.manual_debug || 'false' }}
      debug_timeout: ${{ github.event.inputs.debug_timeout || '5' }}
    secrets: inherit