name: CI - Three-Tier Testing Strategy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: springboot-app

jobs:
  # COMBINED TIER 1 & TIER 2: Fast, Single-Pass Test & Compilation Stage
  test-and-package:
    name: Test, Code Quality & Package
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Code Quality Checks (Spotless, Checkstyle, PMD)
        run: mvn -B spotless:check checkstyle:check pmd:check

      # Runs both Unit and Integration tests in a single runner workspace to leverage Maven build caches fully
      - name: Run All Tests & Package
        run: mvn clean package -B --no-transfer-progress

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-test-reports
          path: target/surefire-reports
          retention-days: 14

      - name: Upload JaCoCo Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco
          retention-days: 14

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 14

  # TIER 3: Build & Push Docker Image (Only runs on main after verification passes)
  build-and-push:
    name: Build & Push to ECR
    needs: test-and-package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::828562155228:role/github-actions-ecr-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # TIER 4: Local Integration Verification using Resilient Health Checking
  verify-deployment:
    name: Verify ECR Image on Runner
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::828562155228:role/github-actions-ecr-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull and Run Isolated Architecture
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
          DB_NAME: expenses_db
          DB_USER: root
          DB_PASSWORD: test_password
        run: |
          docker network create appbridge
          
          # Spin up MySQL with an explicit internal healthcheck instead of manual sleeping
          docker run -d \
            --name mysql \
            --network appbridge \
            -e MYSQL_ROOT_PASSWORD=$DB_PASSWORD \
            -e MYSQL_DATABASE=$DB_NAME \
            --health-cmd="mysqladmin ping -h localhost -u root -p$DB_PASSWORD" \
            --health-interval=5s \
            --health-timeout=2s \
            --health-retries=10 \
            mysql:latest
          
          echo "Waiting for database healthcheck status..."
          until [ "$(docker inspect --format='{{.State.Health.Status}}' mysql)" = "healthy" ]; do
              sleep 2
          done

          # Boot up the Spring application
          docker run -d \
            --name Expensetracker \
            --network appbridge \
            -p 8081:8081 \
            -e SPRING_DATASOURCE_USERNAME=$DB_USER \
            -e SPRING_DATASOURCE_PASSWORD=$DB_PASSWORD \
            -e SPRING_DATASOURCE_URL="jdbc:mysql://mysql:3306/$DB_NAME?allowPublicKeyRetrieval=true&useSSL=false" \
            -e SERVER_PORT=8081 \
            $REGISTRY/$REPOSITORY:$IMAGE_TAG
          
          # Resilient poll instead of 25 seconds blind wait
          echo "Polling Spring Boot application endpoint..."
          TIMEOUT=45
          ELAPSED=0
          until curl -s --fail http://localhost:8081/ || [ $ELAPSED -eq $TIMEOUT ]; do
              sleep 3
              ELAPSED=$((ELAPSED + 3))
          done

          if curl -s --fail http://localhost:8081/; then
            echo "Validation successful! Application is responding flawlessly on port 8081."
          else
            echo "Verification failed! Printing application runtime logs:"
            docker logs Expensetracker
            exit 1
          fi

      - name: Infrastructure Cleanup
        if: always()
        run: |
          docker rm -f Expensetracker mysql || true
          docker network rm appbridge || true