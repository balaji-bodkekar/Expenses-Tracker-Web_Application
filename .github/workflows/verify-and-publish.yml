name: Smoke Test & Publish

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: springboot-app

jobs:
  smoke-test:
    name: Smoke Test Image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::828562155228:role/github-actions-ecr-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull Scanned Image
        run: docker pull ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ inputs.image_tag }}

      - name: Start Isolated Test Stack
        env:
          DB_NAME: expenses_db
          DB_USER: root
          DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
          IMAGE: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ inputs.image_tag }}
        run: |
          docker network create appbridge

          docker run -d \
            --name mysql \
            --network appbridge \
            -e MYSQL_ROOT_PASSWORD="$DB_PASSWORD" \
            -e MYSQL_DATABASE=$DB_NAME \
            --health-cmd="mysqladmin ping -h localhost -u root -p$DB_PASSWORD" \
            --health-interval=5s \
            --health-timeout=2s \
            --health-retries=10 \
            mysql:8.4

          DB_TIMEOUT=60
          DB_ELAPSED=0
          until [ "$(docker inspect --format='{{.State.Health.Status}}' mysql)" = "healthy" ]; do
            if [ $DB_ELAPSED -ge $DB_TIMEOUT ]; then
              echo "MySQL did not become healthy in time. Container logs:"
              docker logs mysql
              exit 1
            fi
            sleep 2
            DB_ELAPSED=$((DB_ELAPSED + 2))
          done

          docker run -d \
            --name Expensetracker \
            --network appbridge \
            -p 8081:8081 \
            -e SPRING_DATASOURCE_USERNAME=$DB_USER \
            -e SPRING_DATASOURCE_PASSWORD="$DB_PASSWORD" \
            -e SPRING_DATASOURCE_URL="jdbc:mysql://mysql:3306/$DB_NAME?allowPublicKeyRetrieval=true&useSSL=false" \
            -e SERVER_PORT=8081 \
            "$IMAGE"

      - name: Poll Application Health
        run: |
          TIMEOUT=45
          ELAPSED=0
          until curl -sf http://localhost:8081/ >/dev/null || [ $ELAPSED -ge $TIMEOUT ]; do
            sleep 3
            ELAPSED=$((ELAPSED + 3))
          done
          if curl -sf http://localhost:8081/ >/dev/null; then
            echo "Smoke test passed."
          else
            docker logs Expensetracker
            exit 1
          fi

      - name: Infrastructure Cleanup
        if: always()
        run: |
          docker rm -f Expensetracker mysql || true
          docker network rm appbridge || true

  publish:
    name: Promote to latest
    needs: smoke-test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::828562155228:role/github-actions-ecr-role
          aws-region: ${{ env.AWS_REGION }}

      # The sha-tagged image was already pushed and scanned in the
      # build-and-scan stage, and just passed the smoke test above. This
      # copies the existing image manifest onto the 'latest' tag via the
      # ECR API directly — no docker pull/push of image bytes required.
      - name: Promote Verified Image to 'latest'
        run: |
            aws ecr batch-get-image \
              --repository-name ${{ env.ECR_REPOSITORY }} \
              --image-ids imageTag=${{ inputs.image_tag }} \
              --query 'images[0].imageManifest' \
              --output text > manifest.json
        
            if aws ecr put-image \
              --repository-name ${{ env.ECR_REPOSITORY }} \
              --image-tag latest \
              --image-manifest file://manifest.json 2> put-image-error.log; then
              echo "Promoted ${{ inputs.image_tag }} to latest."
            elif grep -q "ImageAlreadyExistsException" put-image-error.log; then
              echo "latest already points at this digest — nothing to do."
            else
              cat put-image-error.log
              exit 1
            fi
