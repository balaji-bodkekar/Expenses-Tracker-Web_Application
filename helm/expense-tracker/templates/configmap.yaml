apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "expense-tracker.fullname" . }}-config
  labels:
    {{- include "expense-tracker.labels" . | nindent 4 }}

data:
  SPRING_DATASOURCE_URL: {{ .Values.config.SPRING_DATASOURCE_URL | quote }}
  SPRING_DATASOURCE_USERNAME: {{ .Values.config.SPRING_DATASOURCE_USERNAME | quote }}
  SERVER_PORT: {{ .Values.config.SERVER_PORT | quote }}