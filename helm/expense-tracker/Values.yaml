# Number of application replicas
replicaCount: 2

image:
  repository: 828562155228.dkr.ecr.us-east-1.amazonaws.com/springboot-app
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8081
  targetPort: 8081

container:
  port: 8081

# Application configuration
config:
  SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/expenses_db?allowPublicKeyRetrieval=true&useSSL=false
  SPRING_DATASOURCE_USERNAME: root
  SERVER_PORT: "8081"

# Sensitive values
secret:
  SPRING_DATASOURCE_PASSWORD: change-me

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# Health Checks
readinessProbe:
  path: /actuator/health/readiness
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

livenessProbe:
  path: /actuator/health/liveness
  initialDelaySeconds: 40
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

serviceAccount:
  create: true
  name: ""

ingress:
  enabled: false
  className: nginx

  annotations: {}

  hosts:
    - host: expense.local
      paths:
        - path: /
          pathType: Prefix

  tls: []

nodeSelector: {}

tolerations: []

affinity: {}